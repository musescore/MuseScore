name: 'Check: Unit Tests (utest)'

on:
  pull_request:
  workflow_dispatch:
    inputs:
      code_coverage:
        description: 'Enable code coverage'
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "0 3 * * 4" # Every Thursday night at 03:00 for master branch

concurrency:
  group: ${{ github.workflow }} ${{ github.event_name }} ${{ github.ref }}
  cancel-in-progress: true

jobs:
  run_tests:
    runs-on: ubuntu-24.04
    steps:
    - name: Clone repository
      uses: actions/checkout@v7
      with:
        submodules: recursive
    - name: "Configure workflow"
      run: |
        bash ./buildscripts/ci/tools/make_build_number.sh
        BUILD_NUMBER=$(cat ./build.artifacts/env/build_number.env)

        echo "BUILD_NUMBER=$BUILD_NUMBER" | tee -a $GITHUB_ENV

    - parallel:
      - name: Restore ccache files
        id: restore-ccache
        uses: actions/cache/restore@v6
        with:
          path: ${{ github.workspace }}/.ccache
          key: ${{runner.os}}-${{runner.arch}}-utests-ccache-
          restore-keys: |
            ${{runner.os}}-${{runner.arch}}-utests-ccache-
      - name: Setup ccache
        run: |
          sudo apt-get install -y ccache
          bash ./buildscripts/ci/tools/setup_ccache_config.sh

    - name: Free up disk space
      background: true
      run: |
        sudo docker system prune -a -f
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc /usr/local/.ghcup
        sudo rm -rf /usr/share/swift
        sudo rm -rf /opt/hostedtoolcache/CodeQL

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: 6.10.2
        host: 'linux'
        target: 'desktop'
        arch: 'linux_gcc_64'
        modules: 'qt5compat qtnetworkauth qtshadertools qtwebsockets'
        cache: true
    - name: Setup environment
      run: |
        bash ./buildscripts/ci/linux/setup.sh

    - name: Build
      env:
        GITHUB_EVENT_NAME: ${{ github.event_name }}
        CODE_COVERAGE: ${{ inputs.code_coverage }}
      run: |
        mkdir -p build.artifacts/env

        ENABLE_CODE_COVERAGE='false'

        if [[ "$GITHUB_EVENT_NAME" == "schedule" || "$CODE_COVERAGE" == true ]]; then
          ENABLE_CODE_COVERAGE='true'
        else
          ENABLE_CODE_COVERAGE='false'
        fi

        bash ./buildscripts/ci/linux/build_utest.sh -n ${{ env.BUILD_NUMBER }} --enable_code_coverage ${ENABLE_CODE_COVERAGE}

    - name: Show ccache stats
      run: |
        ccache -sv
    - name: Run tests
      run: |
        bash ./buildscripts/ci/linux/runutests.sh
      env:
        ASAN_OPTIONS: "detect_leaks=0"

    - name: Code coverage
      if: ( github.event_name == 'schedule' || inputs.code_coverage ) && github.repository == 'musescore/MuseScore'
      run: |
        lcov --capture --directory "$(pwd)/build.debug/" --output-file coverage.info --ignore-errors mismatch,inconsistent,gcov,negative
        lcov --remove coverage.info '/usr/*' '*/tests/*' '*/thirdparty/*' '*/moc_*' '*framework/Headers/*' '*.framework/*' '*/hb-*' '*/Qt/*' --output-file filtered_coverage.info --ignore-errors unused

        COVERAGE=$(lcov --summary filtered_coverage.info --ignore-errors inconsistent,corrupt,unsupported,empty,negative,mismatch,gcov | grep -oP 'lines\.+:\s+\K[0-9.]+')
        python3 buildscripts/ci/linux/tools/lcov_badger.py "${COVERAGE}" coverage_badge.svg

    - name: Push to S3
      if: ( github.event_name == 'schedule' || inputs.code_coverage ) && github.repository == 'musescore/MuseScore'
      run: |
        S3_URL='s3://extensions.musescore.org/test/code_coverage/coverage_badge.svg'

        bash ./buildscripts/ci/tools/s3_push_file.sh \
          --s3_key '${{ secrets.S3_KEY }}' \
          --s3_secret '${{ secrets.S3_SECRET }}' \
          --s3_url "${S3_URL}" \
          --file_path "coverage_badge.svg"

    - name: Prepare ccache files for saving
      id: prepare-save-ccache
      if: always()
      run: |
        ccache --recompress 10
        echo "CCACHE_TIMESTAMP=$(date -u +"%F-%T")" | tee -a $GITHUB_OUTPUT
    - name: Save ccache files
      if: always()
      uses: actions/cache/save@v6
      with:
        key: ${{ steps.restore-ccache.outputs.cache-primary-key }}${{ steps.prepare-save-ccache.outputs.CCACHE_TIMESTAMP }}
        path: ${{ github.workspace }}/.ccache
